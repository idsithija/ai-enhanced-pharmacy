<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users</title>
    <link rel="stylesheet" href="common-styles.css">
</head>
<body>
    <div class="navbar">
        <div class="logo">🏥 Pharmacy System</div>
        <div class="nav-right">
            <span class="user-name">Admin User</span>
            <div class="user-avatar">A</div>
        </div>
    </div>
    <div class="layout">
        <div class="sidebar">
            <a href="02-dashboard.html" class="sidebar-item"><span class="icon">📊</span><span>Dashboard</span></a>
            <a href="11-users.html" class="sidebar-item active"><span class="icon">👤</span><span>Users</span></a>
            <a href="index.html" class="sidebar-item"><span class="icon">🏠</span><span>Menu</span></a>
        </div>
        <div class="main-content">
            <div class="page-header">
                <h1>👤 User Management</h1>
                <p>Manage system users and roles</p>
            </div>
            <div class="card">
                <div class="search-box">
                    <input type="text" placeholder="Search users...">
                    <button class="btn btn-primary">+ Add User</button>
                </div>
                <table class="table">
                    <thead>
                        <tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><strong>Admin User</strong></td>
                            <td>admin@pharmacy.com</td>
                            <td><span class="badge badge-danger">Admin</span></td>
                            <td><span class="badge badge-success">Active</span></td>
                            <td><button class="action-btn btn-primary">✏️ Edit</button></td>
                        </tr>
                        <tr>
                            <td><strong>John Pharmacist</strong></td>
                            <td>pharmacist@pharmacy.com</td>
                            <td><span class="badge badge-info">Pharmacist</span></td>
                            <td><span class="badge badge-success">Active</span></td>
                            <td><button class="action-btn btn-primary">✏️ Edit</button></td>
                        </tr>
                        <tr>
                            <td><strong>Jane Cashier</strong></td>
                            <td>cashier@pharmacy.com</td>
                            <td><span class="badge badge-warning">Cashier</span></td>
                            <td><span class="badge badge-success">Active</span></td>
                            <td><button class="action-btn btn-primary">✏️ Edit</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
