<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="common-styles.css">
</head>
<body>
    <div class="navbar">
        <div class="logo">🏥 Pharmacy System</div>
        <div class="nav-right">
            <span class="user-name">Admin User</span>
            <div class="user-avatar">A</div>
        </div>
    </div>
    <div class="layout">
        <div class="sidebar">
            <a href="02-dashboard.html" class="sidebar-item"><span class="icon">📊</span><span>Dashboard</span></a>
            <a href="15-settings.html" class="sidebar-item active"><span class="icon">⚙️</span><span>Settings</span></a>
            <a href="index.html" class="sidebar-item"><span class="icon">🏠</span><span>Menu</span></a>
        </div>
        <div class="main-content">
            <div class="page-header">
                <h1>⚙️ System Settings</h1>
                <p>Configure pharmacy system preferences</p>
            </div>
            
            <div class="card">
                <h3>General Settings</h3>
                <div class="form-group">
                    <label>Pharmacy Name</label>
                    <input type="text" value="ABC Pharmacy">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" value="123 Main Street, City, State 12345">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" value="+1234567890">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" value="contact@abcpharmacy.com">
                </div>
            </div>

            <div class="card" style="margin-top: 20px;">
                <h3>Inventory Settings</h3>
                <div class="form-group">
                    <label>Low Stock Threshold</label>
                    <input type="number" value="10">
                    <small>Alert when stock falls below this number</small>
                </div>
                <div class="form-group">
                    <label>Expiry Alert (Days)</label>
                    <input type="number" value="30">
                    <small>Alert when medicine expires within this many days</small>
                </div>
            </div>

            <div class="card" style="margin-top: 20px;">
                <h3>Tax & Pricing</h3>
                <div class="form-group">
                    <label>Tax Rate (%)</label>
                    <input type="number" value="10" step="0.1">
                </div>
                <div class="form-group">
                    <label>Currency</label>
                    <select>
                        <option>USD ($)</option>
                        <option>EUR (€)</option>
                        <option>GBP (£)</option>
                    </select>
                </div>
            </div>

            <div class="card" style="margin-top: 20px;">
                <h3>Notification Settings</h3>
                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" checked style="width: auto;">
                        Enable Email Notifications
                    </label>
                </div>
                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" checked style="width: auto;">
                        Enable Low Stock Alerts
                    </label>
                </div>
                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" checked style="width: auto;">
                        Enable Expiry Alerts
                    </label>
                </div>
            </div>

            <button class="btn btn-primary" style="margin-top: 20px;">💾 Save Settings</button>
        </div>
    </div>
</body>
</html>
