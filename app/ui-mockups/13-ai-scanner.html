<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Scanner</title>
    <link rel="stylesheet" href="common-styles.css">
    <style>
        .scanner-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            background: #f5f7fa;
            cursor: pointer;
        }
        .upload-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }
        .result-area {
            background: white;
            padding: 25px;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">🏥 Pharmacy System</div>
        <div class="nav-right">
            <span class="user-name">Pharmacist</span>
            <div class="user-avatar">P</div>
        </div>
    </div>
    <div class="layout">
        <div class="sidebar">
            <a href="02-dashboard.html" class="sidebar-item"><span class="icon">📊</span><span>Dashboard</span></a>
            <a href="06-prescriptions.html" class="sidebar-item"><span class="icon">📋</span><span>Prescriptions</span></a>
            <a href="13-ai-scanner.html" class="sidebar-item active"><span class="icon">📷</span><span>AI Scanner</span></a>
            <a href="index.html" class="sidebar-item"><span class="icon">🏠</span><span>Menu</span></a>
        </div>
        <div class="main-content">
            <div class="page-header">
                <h1>📷 AI Prescription Scanner</h1>
                <p>Upload prescription image for automatic OCR processing</p>
            </div>
            <div class="scanner-layout">
                <div class="card">
                    <h3>Upload Prescription Image</h3>
                    <div class="upload-area">
                        <div class="upload-icon">📷</div>
                        <h3>Click to Upload or Drag & Drop</h3>
                        <p>Supported formats: JPG, PNG, PDF</p>
                        <button class="btn btn-primary" style="margin-top: 20px;">📁 Browse Files</button>
                    </div>
                    <button class="btn btn-success" style="width: 100%; margin-top: 20px; font-size: 1.1em;">
                        🤖 Scan with AI
                    </button>
                </div>
                
                <div class="result-area">
                    <h3>Extracted Information</h3>
                    <div class="form-group">
                        <label>Doctor Name</label>
                        <input type="text" value="Dr. John Smith" readonly>
                    </div>
                    <div class="form-group">
                        <label>Patient Name</label>
                        <input type="text" value="John Doe" readonly>
                    </div>
                    <div class="form-group">
                        <label>Medicines Detected</label>
                        <textarea rows="4" readonly>1. Amoxicillin 500mg - 3 times daily for 7 days
2. Paracetamol 500mg - As needed for pain
3. Vitamin C 1000mg - Once daily</textarea>
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="text" value="October 21, 2025" readonly>
                    </div>
                    <div class="form-group">
                        <label>Diagnosis</label>
                        <input type="text" value="Upper Respiratory Infection" readonly>
                    </div>
                    <button class="btn btn-success" style="width: 100%;">
                        ✓ Save Prescription
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
